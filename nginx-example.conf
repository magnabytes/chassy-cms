# nginx configuration for Static Site CMS
# Paste this server{} block into your nginx config (or use as a standalone vhost).
# Replace /var/www/yoursite with the actual absolute path to your project root.
#
# Common PHP-FPM socket paths by platform (set fastcgi_pass below to match):
#   Ubuntu / Debian default   unix:/run/php/php8.3-fpm.sock
#   CloudPanel                unix:/run/php/php8.3-fpm.sock        (adjust PHP version)
#   RunCloud                  unix:/var/run/runcloud/php8.3-fpm-<site>.sock
#   HestiaCP                  unix:/run/php/php8.3-fpm.sock        (or 127.0.0.1:9000)
#   Plesk (nginx mode)        unix:/run/php-fpm/php8.3-fpm.sock
#   Webmin / Virtualmin       unix:/run/php/php8.3-fpm.sock        (or /run/php-fpm/www.sock)
#   DirectAdmin (nginx)       unix:/run/php-fpm/php83.sock
#   cPanel EasyApache FPM     127.0.0.1:9000  (check /etc/cpanel/ea4/php.conf for pool)
#
# Panel-managed setups (CloudPanel, RunCloud, Plesk, HestiaCP):
#   Most panels have an "Additional nginx config" or "Custom rules" textarea in their UI.
#   Paste just the location{} blocks below — skip the outer server{} wrapper.

server {
    listen 80;
    server_name yoursite.com www.yoursite.com;
    root /var/www/yoursite;
    index index.html;

    # Match .htaccess upload limits (also set in .user.ini for PHP-FPM)
    client_max_body_size 16M;

    # ── /admin clean URL (matches Apache's RewriteRule ^admin/?$) ────────────
    location = /admin  { return 301 /admin/; }
    location = /admin/ { try_files /admin/index.php =404;
                         fastcgi_pass unix:/run/php/php8.3-fpm.sock;   # ← same socket as the location ~ \.php$ block below
                         fastcgi_index index.php;
                         include fastcgi_params;
                         fastcgi_param SCRIPT_FILENAME $document_root/admin/index.php; }

    # ── Block data/uploads/ PHP execution (files served normally) ────────────
    location ^~ /data/uploads/ {
        try_files $uri =404;
        location ~* \.(php\d*|phtml|phar|pl|cgi)$ { deny all; }
    }

    # ── Block all other data/ paths ──────────────────────────────────────────
    location ^~ /data/ { deny all; }

    # ── Disable directory listings ───────────────────────────────────────────
    autoindex off;

    # ── PHP via PHP-FPM ──────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;   # ← adjust to match your platform (see header)
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # ── Static site output ───────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
